services:
  vehicle-vault-api:
    image: ghcr.io/atharvacm/vehicle-vault-api:latest
    pull_policy: always
    container_name: vehicle-vault-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_ORIGIN: https://your-frontend-domain.example
      DATABASE_URL: postgresql://postgres.xxohjnsxkcicowcyzmwa:REPLACE_WITH_DB_PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
      DIRECT_URL: postgresql://postgres.xxohjnsxkcicowcyzmwa:REPLACE_WITH_DB_PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
      JWT_SECRET: REPLACE_WITH_STRONG_JWT_SECRET
      JWT_EXPIRES_IN: 7d
    ports:
      - '3001:3001'
    volumes:
      - vehicle_vault_uploads:/app/uploads
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  vehicle_vault_uploads:
