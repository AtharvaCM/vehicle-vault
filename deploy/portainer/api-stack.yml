services:
  vehicle-vault-api:
    build:
      context: /path/to/vehicle-vault
      dockerfile: apps/api/Dockerfile
    container_name: vehicle-vault-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_ORIGIN: https://vehicle-vault-eight.vercel.app
      DATABASE_URL: postgresql://postgres.xxohjnsxkcicowcyzmwa:REPLACE_WITH_DB_PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
      DIRECT_URL: postgresql://postgres.xxohjnsxkcicowcyzmwa:REPLACE_WITH_DB_PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
      SUPABASE_URL: https://xxohjnsxkcicowcyzmwa.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: REPLACE_WITH_SUPABASE_SERVICE_ROLE_KEY
      SUPABASE_STORAGE_BUCKET: vehicle-vault-attachments
      JWT_SECRET: REPLACE_WITH_STRONG_JWT_SECRET
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: REPLACE_WITH_STRONG_REFRESH_JWT_SECRET
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
